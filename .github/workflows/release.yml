name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test
      - run: npm run build
      - name: Package dist
        run: |
          cd dist
          zip -r ../everrealm-${{ github.ref_name }}.zip .
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Everrealm ${{ github.ref_name }}
          generate_release_notes: true
          files: everrealm-${{ github.ref_name }}.zip